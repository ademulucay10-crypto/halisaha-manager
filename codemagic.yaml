workflows:
  halisaha-manager-workflow:
    name: Halısaha Manager Android
    max_build_duration: 60
    environment:
      flutter: stable
      vars:
        PROJECT_DIR: .
    scripts:
      - name: Get dependencies
        script: |
          flutter pub get
      - name: Build APK
        script: |
          flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
    publishing:
      email:
        recipients:
          - your_email@example.com
